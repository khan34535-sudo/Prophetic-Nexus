
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes" />
    <title>Prophetic Trajectories · Blueprint Dashboard</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800;900&family=Georgia:ital@0;1&display=swap');

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', 'Segoe UI', system-ui, sans-serif;
            background: #040d1a;
            color: #f0f4ff;
            height: 100vh;
            overflow: hidden;
            display: flex;
            flex-direction: column;
        }

        /* ----- TIMELINE BAR ----- */
        .timeline-wrapper {
            flex-shrink: 0;
            background: rgba(4, 18, 36, 0.95);
            backdrop-filter: blur(20px);
            border-bottom: 2px solid rgba(45, 212, 191, 0.15);
            padding: 0.7rem 0.8rem;
            overflow-x: auto;
            position: relative;
            z-index: 10;
            scrollbar-width: thin;
        }
        .timeline-wrapper::-webkit-scrollbar { height: 5px; }
        .timeline-wrapper::-webkit-scrollbar-thumb { background: #2dd4bf; border-radius: 10px; }

        .timeline-container {
            display: flex;
            align-items: center;
            gap: 0.5rem;
            min-width: max-content;
            padding: 0.1rem 0.3rem;
        }

        .timeline-node {
            display: flex;
            flex-direction: column;
            align-items: center;
            cursor: pointer;
            padding: 0.5rem 0.7rem;
            border-radius: 12px;
            border: 2px solid transparent;
            background: rgba(255, 255, 255, 0.03);
            transition: all 0.2s cubic-bezier(0.4, 0, 0.2, 1);
            min-width: 75px;
        }
        .timeline-node:hover {
            background: rgba(45, 212, 191, 0.08);
            border-color: rgba(45, 212, 191, 0.3);
            transform: translateY(-2px);
        }
        .timeline-node.active {
            border-color: #2dd4bf;
            background: rgba(45, 212, 191, 0.15);
            box-shadow: 0 0 15px rgba(45, 212, 191, 0.25);
        }
        .timeline-node .symbol-grid { 
            font-size: 1.3rem; 
            margin-bottom: 4px; 
            display: inline-block;
            line-height: 1;
        }
        .timeline-node .tname {
            font-size: 0.68rem;
            font-weight: 700;
            color: #94a3b8;
            text-align: center;
            white-space: nowrap;
        }
        .timeline-node.active .tname { color: #ffffff; }

        /* ----- SPLIT WORKSPACE ----- */
        .workspace {
            flex: 1;
            display: flex;
            flex-direction: row;
            min-height: 0;
            position: relative;
        }

        /* 3D Panel Viewport */
        .viewport-3d {
            flex: 1.5;
            position: relative;
            background: radial-gradient(ellipse at 50% 30%, #081e36, #030a14 85%);
            overflow: hidden;
        }
        #three-canvas { width: 100%; height: 100%; display: block; cursor: grab; }
        #three-canvas:active { cursor: grabbing; }

        /* Geographical Map Panel */
        .map-panel {
            width: 0%;
            position: relative;
            background: #0d1e2d;
            display: flex;
            flex-direction: column;
            transition: width 0.5s cubic-bezier(0.25, 1, 0.5, 1);
            border-left: 0px solid rgba(45, 212, 191, 0.2);
            overflow: hidden;
        }
        .map-panel.visible {
            width: 45%;
            border-left: 2px solid rgba(45, 212, 191, 0.3);
        }
        #prophetMap { width: 100%; height: 100%; }

        .leaflet-tile-pane { 
            filter: hue-rotate(145deg) brightness(0.85) saturate(1.5) contrast(1.1); 
        }

        /* ----- HOLOGRAPHIC DETAIL CARD ----- */
        .holographic-card {
            position: absolute;
            top: 50%;
            left: 25%;
            transform: translate(-50%, -50%) scale(0.9);
            width: min(480px, 85vw);
            max-height: 85vh;
            background: rgba(4, 16, 33, 0.96);
            backdrop-filter: blur(30px);
            border: 2px solid rgba(45, 212, 191, 0.25);
            border-radius: 24px;
            padding: 1.6rem;
            box-shadow: 0 40px 100px rgba(0, 0, 0, 0.85), 0 0 50px rgba(45, 212, 191, 0.1);
            z-index: 25;
            opacity: 0;
            pointer-events: none;
            transition: all 0.35s cubic-bezier(0.25, 1, 0.5, 1);
            overflow-y: auto;
        }
        .holographic-card.active {
            opacity: 1;
            pointer-events: auto;
            transform: translate(-50%, -50%) scale(1);
        }
        .card-close {
            position: absolute;
            top: 14px;
            right: 16px;
            background: none;
            border: none;
            color: #94a3b8;
            font-size: 1.3rem;
            cursor: pointer;
            transition: color 0.2s;
        }
        .card-close:hover { color: #f43f5e; }

        .card-header { display: flex; align-items: center; gap: 14px; margin-bottom: 1rem; }
        .card-header .symbol-big { font-size: 2.6rem; line-height: 1; }
        .card-header h2 { font-family: 'Georgia', serif; font-size: 1.65rem; color: #fbbf24; }
        .card-header .era { font-size: 0.78rem; color: #60a5fa; font-weight: 600; margin-top: 2px; }

        /* RED TRIGGER MAP ACTION BUTTON */
        .map-action-btn {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            width: 100%;
            background: #dc2626;
            color: #ffffff;
            border: none;
            padding: 0.75rem 1rem;
            border-radius: 12px;
            font-size: 0.85rem;
            font-weight: 700;
            letter-spacing: 0.02em;
            cursor: pointer;
            margin-bottom: 1.2rem;
            transition: background 0.2s, transform 0.1s;
            box-shadow: 0 4px 15px rgba(220, 38, 38, 0.3);
        }
        .map-action-btn:hover {
            background: #b91c1c;
            transform: translateY(-1px);
        }

        .info-segment {
            margin-bottom: 0.8rem;
            padding: 0.6rem 0.8rem;
            background: rgba(255, 255, 255, 0.01);
            border: 1px solid rgba(255, 255, 255, 0.03);
            border-radius: 10px;
        }
        .info-segment.mission { border-left: 3px solid #2dd4bf; background: rgba(45, 212, 191, 0.02); }
        .info-segment.accomplishment { border-left: 3px solid #3b82f6; background: rgba(59, 130, 246, 0.02); }
        .info-segment.hardship { border-left: 3px solid #f43f5e; background: rgba(244, 63, 94, 0.02); }
        
        .segment-label {
            font-size: 0.65rem;
            text-transform: uppercase;
            font-weight: 800;
            letter-spacing: 0.05em;
            margin-bottom: 3px;
            display: block;
        }
        .info-segment.mission .segment-label { color: #2dd4bf; }
        .info-segment.accomplishment .segment-label { color: #60a5fa; }
        .info-segment.hardship .segment-label { color: #fb7185; }
        
        .segment-text { font-size: 0.78rem; line-height: 1.5; color: #e2e8f0; }

        .hint-overlay {
            position: absolute;
            bottom: 16px;
            left: 20px;
            font-size: 0.65rem;
            color: #94a3b8;
            background: rgba(4, 13, 26, 0.75);
            padding: 6px 14px;
            border-radius: 20px;
            pointer-events: none;
            z-index: 5;
            border: 1px solid rgba(255, 255, 255, 0.05);
        }

        .leaflet-popup-content-wrapper { 
            background: #07192c; 
            color: #ffffff; 
            border: 2px solid #2dd4bf; 
            border-radius: 12px;
        }
        .leaflet-popup-tip { background: #07192c; border: 1px solid #2dd4bf; }
        .popup-title { color: #fbbf24; font-weight: 700; font-size: 0.95rem; display: block; }

        @media (max-width: 900px) {
            .workspace { flex-direction: column; }
            .map-panel.visible { width: 100%; height: 45%; }
            .holographic-card { left: 50%; top: 45%; width: 90vw; max-height: 55vh; }
        }
    </style>
</head>

        </div>
    </div>

        let currentIndex = 0;
        let scene, camera, renderer, raycaster, mouse;

        let map, mapMarkers = [];
        let isDragging = false;
        let prevMouse = { x: 0, y: 0 };
        let controls = { target: new THREE.Vector3(0, 0, 0), theta: 0, phi: 0.4, radius: 9 };

        const timelineContainer = document.getElementById('timelineContainer');
        const cardElement = document.getElementById('holographicCard');
        const cardContent = document.getElementById('cardContent');
        const mapPanel = document.getElementById('mapPanel');

        window.addEventListener('DOMContentLoaded', () => {
            renderTimeline();
            initLeafletMap();
            initThreeDGrid();
            selectProphet(0);
        });

        function renderTimeline() {
            prophets.forEach((p, idx) => {
                const node = document.createElement('div');
                node.className = 'timeline-node';
                node.id = `node-${idx}`;
                node.onclick = () => {
                    selectProphet(idx);
                    openHolographicCard(idx);
                };
                node.innerHTML = `
                    <div class="symbol-grid">${p.symbol}</div>
                    <div class="tname">${p.name}</div>
                `;
                timelineContainer.appendChild(node);
            });
        }

        function initLeafletMap() {
            map = L.map('prophetMap', { center: [26.0, 38.0], zoom: 4 });
            L.tileLayer('https://{s}.basemaps.cartocdn.com/rastertiles/voyager_labels_under/{z}/{x}/{y}{r}.png', {
                attribution: '&copy; OpenStreetMap &copy; CartoDB'
            }).addTo(map);

            prophets.forEach((p, idx) => {
                const marker = L.marker([p.lat, p.lon]).addTo(map)
                    .bindPopup(`<span class="popup-title">${p.symbol} ${p.name}</span>`);
                mapMarkers.push(marker);
            });
        }

        function initThreeDGrid() {
            const container = document.getElementById('viewport3D');
            scene = new THREE.Scene();
            scene.background = new THREE.Color(0x040d1a);

            camera = new THREE.PerspectiveCamera(45, container.clientWidth / container.clientHeight, 0.1, 100);
            updateCameraPosition();

            renderer = new THREE.WebGLRenderer({ canvas: document.getElementById('three-canvas'), antialias: true });
            renderer.setSize(container.clientWidth, container.clientHeight);
            renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));

            const gridHelper = new THREE.GridHelper(16, 32, 0x2dd4bf, 0x162c46);
            gridHelper.position.y = -0.5;
            scene.add(gridHelper);

            scene.add(new THREE.AmbientLight(0x13253e, 2.5));
            const directionalLight = new THREE.DirectionalLight(0x2dd4bf, 1.8);
            directionalLight.position.set(5, 12, 5);
            scene.add(directionalLight);

            const totalNodes = prophets.length;
            prophets.forEach((p, idx) => {
                const angle = (idx / totalNodes) * Math.PI * 2;
                const radius = 5.2; 
                
                const group = new THREE.Group();
                group.position.set(Math.cos(angle) * radius, 0.4, Math.sin(angle) * radius);
                group.userData = { index: idx, name: p.name };

                const coreMesh = new THREE.Mesh(
                    new THREE.SphereGeometry(0.25, 16, 16),
                    new THREE.MeshStandardMaterial({ color: 0x2dd4bf, emissive: 0x2dd4bf, emissiveIntensity: 0.35 })
                );
                group.add(coreMesh);

                // Combined Symbol + Text Canvas to fix missing grid symbols (Enlarged fonts)
                const canvasLabel = document.createElement('canvas');
                canvasLabel.width = 300; canvasLabel.height = 80;
                const ctx = canvasLabel.getContext('2d');
                ctx.fillStyle = '#cbd5e1'; 
                ctx.font = 'bold 32px sans-serif'; 
                ctx.textAlign = 'center';
                ctx.fillText(`${p.symbol} ${p.name}`, 150, 45);
                
                const sprite = new THREE.Sprite(new THREE.SpriteMaterial({
                    map: new THREE.CanvasTexture(canvasLabel), depthTest: false
                }));
                sprite.position.y = 0.8; 
                sprite.scale.set(3.0, 1.0, 1); // Significantly scaled up size layout
                group.add(sprite);

                scene.add(group);
                prophetMeshes.push(group);
            });

            raycaster = new THREE.Raycaster();
            mouse = new THREE.Vector2();

            const canvasEl = renderer.domElement;
            canvasEl.addEventListener('mousedown', (e) => { isDragging = true; prevMouse.x = e.clientX; prevMouse.y = e.clientY; });
            canvasEl.addEventListener('mousemove', onMouseMove);
            canvasEl.addEventListener('mouseup', () => isDragging = false);
            canvasEl.addEventListener('click', onClick3DGrid);

            window.addEventListener('resize', () => {
                camera.aspect = container.clientWidth / container.clientHeight;
                camera.updateProjectionMatrix();
                renderer.setSize(container.clientWidth, container.clientHeight);
            });

            function animate() {
                requestAnimationFrame(animate);
                
                // Clockwise rotation orbit modifier added here
                if (!isDragging) {
                    controls.theta -= 0.002; 
                    updateCameraPosition();
                }

                prophetMeshes.forEach((mesh, idx) => {
                    mesh.position.y = 0.4 + Math.sin(Date.now() * 0.0015 + idx) * 0.05;
                });
                renderer.render(scene, camera);
            }
            animate();
        }

        function onMouseMove(e) {
            if (isDragging) {
                const deltaX = e.clientX - prevMouse.x;
                const deltaY = e.clientY - prevMouse.y;
                // Reverse rotation mapping calculation for absolute manual drag parity
                controls.theta += deltaX * 0.006;
                controls.phi += deltaY * 0.006;
                controls.phi = Math.max(0.1, Math.min(1.3, controls.phi));
                prevMouse.x = e.clientX; prevMouse.y = e.clientY;
                updateCameraPosition();
            }
        }

        function onClick3DGrid(e) {
            const rect = renderer.domElement.getBoundingClientRect();
            mouse.x = ((e.clientX - rect.left) / rect.width) * 2 - 1;
            mouse.y = -((e.clientY - rect.top) / rect.height) * 2 + 1;

            raycaster.setFromCamera(mouse, camera);
            const intersects = raycaster.intersectObjects(prophetMeshes, true);

            if (intersects.length > 0) {
                let targetGroup = intersects[0].object;
                while (targetGroup.parent && targetGroup.type !== "Group") {
                    targetGroup = targetGroup.parent;
                }
                const targetIdx = targetGroup.userData.index;
                selectProphet(targetIdx);
                openHolographicCard(targetIdx);
            }
        }

        function updateCameraPosition() {
            camera.position.x = controls.radius * Math.sin(controls.theta) * Math.cos(controls.phi);
            camera.position.y = controls.radius * Math.sin(controls.phi);
            camera.position.z = controls.radius * Math.cos(controls.theta) * Math.cos(controls.phi);
            camera.lookAt(controls.target);
        }

        function selectProphet(index) {
            currentIndex = index;
            document.querySelectorAll('.timeline-node').forEach((node, idx) => {
                node.classList.toggle('active', idx === index);
            });

            const targetNode = document.getElementById(`node-${index}`);
            if (targetNode) {
                targetNode.scrollIntoView({ behavior: 'smooth', inline: 'center', block: 'nearest' });
            }

            prophetMeshes.forEach((group, idx) => {
                const active = idx === index;
                group.scale.setScalar(active ? 1.6 : 1.0);
                group.children[0].material.color.setHex(active ? 0xfbbf24 : 0x2dd4bf);
                group.children[0].material.emissiveIntensity = active ? 0.8 : 0.3;
            });
        }

        function openHolographicCard(index) {
            const p = prophets[index];
            cardContent.innerHTML = `
                <div class="card-header">
                    <span class="symbol-big">${p.symbol}</span>
                    <div>
                        <h2>${p.name}</h2>
                        <div class="era">${p.era} · ${p.region}</div>
                    </div>
                </div>

                <button class="map-action-btn" onclick="triggerMapReveal(${index})">
                    🗺️ Open and Focus Map View
                </button>
                
                <div class="info-segment mission">
                    <span class="segment-label">Divine Purpose & Mission</span>
                    <div class="segment-text">${p.purpose}</div>
                </div>
                
                <div class="info-segment accomplishment">
                    <span class="segment-label">Accomplishments & Miracles</span>
                    <div class="segment-text">${p.accomplishments}</div>
                </div>
                
                <div class="info-segment hardship">
                    <span class="segment-label">Severe Hardships Faced</span>
                    <div class="segment-text">${p.hardships}</div>
                </div>
            `;
            cardElement.classList.add('active');
        }

        function triggerMapReveal(index) {
            const data = prophets[index];
            mapPanel.classList.add('visible');
            
            setTimeout(() => {
                map.invalidateSize();
                map.panTo([data.lat, data.lon], { animate: true, duration: 0.8 });
                mapMarkers[index].openPopup();
            }, 300);
        }

        function closeCard() {
            cardElement.classList.remove('active');
            mapPanel.classList.remove('visible');
            setTimeout(() => { map.invalidateSize(); }, 500);
        }
    </script>
</body>
</html>
